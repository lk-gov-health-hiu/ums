<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:head>
    <title>Utilisation Monitoring System</title>
    <h:outputStylesheet library="css" name="ums.css"/>
</h:head>
<h:body>
    <div class="ums-topbar">
        <h:link outcome="/admin/index.xhtml" styleClass="ums-brand">
            UMS<small>Utilisation Monitoring</small>
        </h:link>
        <h:form id="navForm">
            <p:menubar>
                <p:menuitem value="Home" outcome="/admin/index.xhtml" icon="pi pi-home"
                            rendered="#{sessionController.loggedIn}"/>
                <p:menuitem value="Institutions" outcome="/admin/institution/list.xhtml" icon="pi pi-building"
                            rendered="#{sessionController.canManageMasterData()}"/>
                <p:menuitem value="Equipment Types" outcome="/admin/equipmentType/list.xhtml" icon="pi pi-list"
                            rendered="#{sessionController.canManageMasterData()}"/>
                <p:menuitem value="Equipment" outcome="/admin/equipment/list.xhtml" icon="pi pi-desktop"
                            rendered="#{sessionController.canManageEquipment()}"/>
                <p:menuitem value="Users" outcome="/admin/webUser/list.xhtml" icon="pi pi-users"
                            rendered="#{sessionController.canManageUsers()}"/>
                <p:menuitem value="Daily Entry" url="#{request.contextPath}/entry/" icon="pi pi-calendar"
                            rendered="#{sessionController.isRestrictedToInstitution()}"/>
                <f:facet name="options">
                    <p:menuitem value="Logout (#{sessionController.webUser.displayName})" action="#{sessionController.logout()}" icon="pi pi-sign-out"/>
                </f:facet>
            </p:menubar>
        </h:form>
    </div>

    <div class="ums-content">
        <ui:insert name="content"/>
    </div>
</h:body>
</html>
