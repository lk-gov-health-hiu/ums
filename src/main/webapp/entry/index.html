<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Equipment Status — UMS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10171b">
<style>
  @font-face {
    font-family: 'Space Grotesk';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('/ums/fonts/SpaceGrotesk-700.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('/ums/fonts/IBMPlexSans-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('/ums/fonts/IBMPlexSans-600.woff2') format('woff2');
  }
  :root {
    --bg: #10171b; --panel: #1b252b; --hairline: #2e3a40;
    --ink: #e7edf0; --ink-muted: #8fa3ac;
    --green: #3fbf7f; --amber: #e0a64b; --red: #d9534f; --grey: #6b7680; --cyan: #4fc3d9;
  }
  * { box-sizing: border-box; }
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;max-width:480px;margin:0 auto;padding:20px;color:var(--ink);background:var(--bg);}
  h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;}
  form{background:var(--panel);border:1px solid var(--hairline);border-radius:8px;padding:18px;margin-top:16px;}
  label{display:block;margin-top:14px;font-weight:600;font-size:13px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.03em;}
  select,input{width:100%;padding:10px;font-size:16px;margin-top:6px;box-sizing:border-box;background:var(--bg);color:var(--ink);border:1px solid var(--hairline);border-radius:4px;}
  select:focus,input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan);}
  button{width:100%;padding:14px;font-size:16px;font-weight:600;margin-top:20px;background:var(--cyan);color:var(--bg);border:none;border-radius:4px;}
  button:hover{background:#6fd2e3;}
  #resultMessage{margin-top:14px;font-size:14px;}
  #queueNote{margin-top:8px;font-size:13px;color:var(--amber);}
  .status-field{border-left:4px solid var(--grey);padding-left:12px;margin-top:14px;transition:border-color .2s;}
  .status-field label{margin-top:0;}
  .status-field[data-status="FUNCTIONING"]{border-color:var(--green);}
  .status-field[data-status="UNDER_REPAIR"],.status-field[data-status="AWAITING_PARTS"]{border-color:var(--amber);}
  .status-field[data-status="NON_FUNCTIONAL_BER"]{border-color:var(--red);}
  .status-field[data-status="IDLE_NO_OPERATOR"]{border-color:var(--grey);}
  #userBar{display:none;justify-content:space-between;align-items:center;margin-top:10px;}
  #userBar span{color:var(--ink-muted);font-size:13px;}
  #logoutBtn{width:auto;padding:6px 14px;font-size:13px;font-weight:600;margin-top:0;background:transparent;color:var(--ink-muted);border:1px solid var(--hairline);border-radius:4px;}
  #logoutBtn:hover{background:var(--panel);color:var(--ink);}
</style>
</head>
<body>
  <h1>Daily Equipment Status</h1>

  <div id="userBar">
    <span id="currentUserLabel"></span>
    <button type="button" id="logoutBtn">Sign out</button>
  </div>

  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" required>
    <button type="submit">Sign in</button>
    <div id="loginStatus"></div>
  </form>

  <form id="entryForm" style="display:none">
    <label for="equipment">Equipment</label>
    <select id="equipment" required></select>

    <label for="logDate">Date</label>
    <input type="date" id="logDate" required>

    <div class="status-field" id="statusField" data-status="FUNCTIONING">
      <label for="statusSelect">Status</label>
      <select id="statusSelect" required>
        <option value="FUNCTIONING">Functioning</option>
        <option value="UNDER_REPAIR">Under Repair</option>
        <option value="AWAITING_PARTS">Awaiting Parts</option>
        <option value="NON_FUNCTIONAL_BER">Non-Functional — Beyond Economical Repair</option>
        <option value="IDLE_NO_OPERATOR">Idle — No Operator</option>
      </select>
    </div>

    <label for="count">Procedures done today</label>
    <input type="number" id="count" min="0" value="0" required>

    <button type="submit">Submit</button>
  </form>
  <div id="resultMessage"></div>
  <div id="queueNote"></div>

  <script src="app.js"></script>
</body>
</html>
